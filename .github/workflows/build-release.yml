name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Next.js (static export for APK)
        run: |
          mkdir -p /tmp/api-routes-backup
          mv src/app/api /tmp/api-routes-backup/ || true
          BUILD_TYPE=apk \
          NEXT_PUBLIC_API_BASE=https://abualzahracom.online \
          NEXT_PUBLIC_SUPABASE_URL=https://ntshduvxdehefxmchusw.supabase.co \
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=sb_publishable_nnhQkb5fX6SPZ7Nx8L7rcg_r-BDxd-M \
          bun run build || { mv /tmp/api-routes-backup/api src/app/api 2>/dev/null; exit 1; }
          mv /tmp/api-routes-backup/api src/app/api 2>/dev/null || true
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Create keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/alshifa-release.jks
          cat > android/key.properties << EOF
          storeFile=alshifa-release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build APK (release)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Build AAB (for Play Store)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Get version
        id: version
        run: echo "VERSION=$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alshifa-${{ steps.version.outputs.VERSION }}.apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: alshifa-${{ steps.version.outputs.VERSION }}.aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.3-${{ steps.version.outputs.VERSION }}
          name: Release v1.3 (${{ steps.version.outputs.VERSION }})
          files: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

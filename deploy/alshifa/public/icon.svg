<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5f4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d3d2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a843;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c49b2e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background rounded rectangle -->
  <rect width="512" height="512" rx="80" ry="80" fill="url(#bg)"/>
  <!-- Decorative border -->
  <rect x="16" y="16" width="480" height="480" rx="68" ry="68" fill="none" stroke="#d4a843" stroke-width="2" opacity="0.4"/>
  <!-- Inner decorative frame -->
  <rect x="32" y="32" width="448" height="448" rx="56" ry="56" fill="none" stroke="#d4a843" stroke-width="1" opacity="0.2"/>
  <!-- Open Book Base -->
  <g filter="url(#shadow)" transform="translate(256, 270)">
    <!-- Left page -->
    <path d="M-10,-70 C-30,-75 -120,-65 -150,-50 L-150,80 C-120,65 -30,75 -10,70 Z" fill="#fff8e7" opacity="0.95"/>
    <!-- Right page -->
    <path d="M10,-70 C30,-75 120,-65 150,-50 L150,80 C120,65 30,75 10,70 Z" fill="#fff8e7" opacity="0.95"/>
    <!-- Book spine shadow -->
    <path d="M-10,-70 L-10,70 C0,65 0,65 10,70 L10,-70 C0,-75 0,-75 -10,-70 Z" fill="#e8dcc4" opacity="0.8"/>
    <!-- Left page text lines -->
    <line x1="-130" y1="-30" x2="-30" y2="-35" stroke="#c49b2e" stroke-width="1.5" opacity="0.3"/>
    <line x1="-125" y1="-10" x2="-30" y2="-15" stroke="#c49b2e" stroke-width="1.5" opacity="0.3"/>
    <line x1="-120" y1="10" x2="-30" y2="5" stroke="#c49b2e" stroke-width="1.5" opacity="0.3"/>
    <line x1="-115" y1="30" x2="-30" y2="25" stroke="#c49b2e" stroke-width="1.5" opacity="0.3"/>
    <line x1="-110" y1="50" x2="-30" y2="45" stroke="#c49b2e" stroke-width="1.5" opacity="0.3"/>
    <!-- Right page text lines -->
    <line x1="30" y1="-35" x2="130" y2="-30" stroke="#c49b2e" stroke-width="1.5" opacity="0.3"/>
    <line x1="30" y1="-15" x2="125" y2="-10" stroke="#c49b2e" stroke-width="1.5" opacity="0.3"/>
    <line x1="30" y1="5" x2="120" y2="10" stroke="#c49b2e" stroke-width="1.5" opacity="0.3"/>
    <line x1="30" y1="25" x2="115" y2="30" stroke="#c49b2e" stroke-width="1.5" opacity="0.3"/>
    <line x1="30" y1="45" x2="110" y2="50" stroke="#c49b2e" stroke-width="1.5" opacity="0.3"/>
    <!-- Bismillah on book -->
    <text x="0" y="-30" text-anchor="middle" font-family="Amiri, serif" font-size="26" fill="#0d3d2e" opacity="0.8">بسم الله</text>
    <!-- Star/crescent ornament at top of book -->
    <g transform="translate(0, -90)">
      <circle cx="0" cy="0" r="18" fill="url(#gold)"/>
      <path d="M-3,-8 L3,-8 L5,0 L8,0 L5,6 L6,14 L0,10 L-6,14 L-5,6 L-8,0 L-5,0 Z" fill="#0d3d2e" opacity="0.7"/>
    </g>
  </g>
  <!-- Center name text -->
  <text x="256" y="420" text-anchor="middle" font-family="Amiri, serif" font-size="36" font-weight="700" fill="#d4a843">مركز الشفاء</text>
  <text x="256" y="460" text-anchor="middle" font-family="Cairo, sans-serif" font-size="16" fill="#d4a843" opacity="0.7">لتحفيظ القرآن الكريم</text>
  <!-- Top decorative arc -->
  <path d="M128,80 Q256,40 384,80" fill="none" stroke="#d4a843" stroke-width="1.5" opacity="0.3"/>
  <path d="M144,90 Q256,55 368,90" fill="none" stroke="#d4a843" stroke-width="1" opacity="0.2"/>
</svg>
